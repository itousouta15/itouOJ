# 與伺服器 /etc/nginx/sites-enabled/online-judge 同步。
# 全新伺服器的設定流程：先只留 80 的 server 區塊（server_name 換成你的網域），
# 再跑 certbot --nginx -d <網域> --redirect，它會自動補出下面的 443 區塊和轉址。
#
# 2026-07-20 遷移到新機器（23.146.248.176，舊機 23.146.248.51 硬碟出問題後換機）。
# 這次只保留 oj.itousouta.me 一個網域（oj.itousouta15.tw 停用，不再指到這台主機、
# 也沒有再申請憑證），是目前唯一的正式網域。
server {
    server_name oj.itousouta.me;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/oj.itousouta.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/oj.itousouta.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = oj.itousouta.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name oj.itousouta.me;
    return 404; # managed by Certbot
}
