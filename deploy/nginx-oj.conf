# 與伺服器 /etc/nginx/sites-enabled/online-judge 同步。
# 全新伺服器的設定流程：先只留 80 的 server 區塊（server_name 換成你的網域），
# 再跑 certbot --nginx -d <網域> --redirect，它會自動補出下面的 443 區塊和轉址。
#
# 2026-07 遷移到 oj.itousouta.me：certbot --nginx -d oj.itousouta15.tw -d oj.itousouta.me --redirect
# 擴充憑證後，它把 oj.itousouta.me 生成了獨立、沒有 proxy_pass 的空殼 443 區塊（一律 404），
# 所以下面是手動合併成單一 443/80 區塊、兩個 server_name 共用同一張憑證後的正確版本。
server {
    server_name oj.itousouta15.tw oj.itousouta.me;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/oj.itousouta15.tw/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/oj.itousouta15.tw/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = oj.itousouta15.tw) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = oj.itousouta.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name oj.itousouta15.tw oj.itousouta.me;
    return 404; # managed by Certbot
}
